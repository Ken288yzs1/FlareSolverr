name: Build and Push Docker Image

# 手动触发
on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本标签 (例如: 3.4.6)'
        required: true
        default: 'latest'
      platforms:
        description: '构建平台'
        required: true
        default: 'linux/amd64'
        type: choice
        options:
          - linux/amd64
          - linux/arm64
          - linux/amd64,linux/arm64
          - linux/386,linux/amd64,linux/arm/v7,linux/arm64/v8

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 QEMU（多架构支持）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录 DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. 构建并推送镜像
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ github.event.inputs.platforms }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flaresolverr:${{ github.event.inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/flaresolverr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
